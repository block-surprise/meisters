<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイクラ・マイスター検定 | ホーム</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 共通ヘッダー -->
    <div id="header-placeholder"></div>

    <!-- メインコンテンツ -->
    <main class="home-wrapper">
        <!-- ヒーローエリア -->
        <section class="hero-section">
            <div class="hero-content">
                <h2 class="hero-copy">君の知識を、<br>最強の武器に。</h2>
                <p>全100問以上の難問に挑み、最高ランク「ネザライト」を目指せ！</p>
            </div>
        </section>

        <!-- メインメニュー（タイル） -->
        <div class="bento-container">
            <a href="quiz.html?lv=1" class="tile card-green">
                <span class="badge">Lv.1</span>
                <h3>初級検定</h3>
                <p>まずはここから。サバイバルの基本知識。</p>
            </a>
            
            <a href="quiz.html?lv=2" class="tile card-iron">
                <span class="badge">Lv.2</span>
                <h3>中級検定</h3>
                <p>ネザー攻略やレッドストーンの基礎。</p>
            </a>

            <a href="quiz.html?lv=3" class="tile card-diamond">
                <span class="badge">Lv.3</span>
                <h3>上級検定</h3>
                <p>コマンドと技術。真の達人向け。</p>
            </a>

            <!-- 動的な情報タイル -->
            <div class="tile card-stats">
                <h3>現在のステータス</h3>
                <p id="user-status">ログインして確認</p>
            </div>

            <!-- 広告枠（最初から確保しておくのがコツ） -->
            <div class="tile card-ad">
                <p class="ad-label">ADVERTISEMENT</p>
                <div class="ad-content">ここに広告</div>
            </div>
        </div>
    </main>

    <!-- 共通処理JS -->
    <script src="common.js"></script>
</body>
</html>
